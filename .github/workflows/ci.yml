name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: Sync deps
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (pyright strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: Sync deps
        run: uv sync --extra dev
      - name: pyright
        run: uv run pyright

  test:
    name: Test (pytest)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: Sync deps
        run: uv sync --extra dev
      - name: pytest
        run: uv run pytest --cov=kairon --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  real-data-smoke:
    name: Real-data smoke (W9.4)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: Sync deps
        run: uv sync --extra dev
      - name: W9.4 smoke — 1mo BTCUSDT 1h (synthetic if no network)
        run: |
          uv run python scripts/run_e2e.py btc_1h \
            --report-path reports/w9_4_smoke_btc_1h.md \
            --sidecar-path artifacts/w9_4_smoke_status.json \
            --n-bars 720
        env:
          KAIRON_SMOKE_MODE: synthetic
      - name: Verify smoke report written
        run: |
          test -s reports/w9_4_smoke_btc_1h.md
          test -s artifacts/w9_4_smoke_status.json
