<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kairon</title>
    <link rel="stylesheet" href="{{ url_for('kairon-web-static', path='/tokens.css') }}" />
    <link rel="stylesheet" href="{{ url_for('kairon-web-static', path='/primitives.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
    />
    <style>
        html { background: #0A0B0E; }
        body {
            background-image: url("{{ url_for('kairon-static', path='/earth.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        main.kairon-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }
        .kairon-screen { width: min(900px, 100%); }
        .kairon-screen-title { margin: 0 0 24px 0; font-size: 22px; font-weight: 600; }
        .kairon-drop-zone {
            border: 1px dashed var(--glass-border);
            border-radius: 0;
            padding: 32px;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .kairon-horizon-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .kairon-horizon-tile { display: flex; flex-direction: column; gap: 8px; cursor: pointer; }
        .kairon-horizon-desc { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
        .kairon-bento { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .kairon-model-tile { display: flex; flex-direction: column; gap: 8px; }
        .kairon-tile-meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-family: var(--font-mono); font-size: 12px; margin: 0; }
        .kairon-tile-meta dt { color: var(--text-muted); }
        .kairon-tile-meta dd { margin: 0; color: var(--text); text-align: right; }
        .kairon-actions { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
        .kairon-progress-ring {
            display: flex; align-items: center; justify-content: center;
            height: 160px; margin: 32px 0;
            border: 2px solid var(--accent); border-radius: 50%;
            width: 160px; margin-left: auto; margin-right: auto;
        }
        .kairon-progress-ring-stage { font-family: var(--font-mono); font-size: 14px; color: var(--text); }
        .kairon-track-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
        .kairon-track-table th { text-align: left; color: var(--text-muted); padding: 8px; border-bottom: 1px solid var(--glass-border); }
        .kairon-track-table td { padding: 8px; border-bottom: 1px solid var(--glass-border); }
    </style>
</head>
<body>
    <main class="kairon-shell">
        {% block body %}{% endblock %}
    </main>
</body>
</html>
