[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ---------------------------------------------------------------------------
# Pyright (strict)
# ---------------------------------------------------------------------------
[tool.pyright]
include = ["src", "tests"]
exclude = ["**/__pycache__", "**/.venv", "**/node_modules"]
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportMissingImports = "error"
reportMissingTypeStubs = "warning"
reportUnusedImport = "warning"
reportUnusedVariable = "warning"
reportUnknownMemberType = "warning"
reportUnknownArgumentType = "warning"
reportUnknownVariableType = "warning"
reportUnknownParameterType = "warning"
reportMissingTypeArgument = "warning"
reportPrivateImportUsage = "warning"
reportMissingParameterType = "warning"
useLibraryCodeForTypes = true
strict = ["src/kairon/**"]

# ---------------------------------------------------------------------------
# Mypy (defense in depth, optional)
# ---------------------------------------------------------------------------
[[tool.mypy.overrides]]
module = "kairon.*"
strict = true
disallow_untyped_decorators = true
warn_unused_ignores = true
warn_return_any = true
disallow_any_explicit = false

[[tool.mypy.overrides]]
module = ["ccxt.*", "pandas.*", "numpy.*", "backtesting.*", "vectorbt.*", "quantstats.*"]
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
]
markers = [
    "leakage: tests that ensure no future-leakage in labels or features",
    "slow: tests that take > 5 seconds",
    "integration: tests that hit external services",
    "unit: fast unit tests",
    "property: property-based tests using hypothesis",
    "asyncio: async test functions",
]
asyncio_mode = "auto"
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:ccxt.*",
    "ignore::DeprecationWarning:pandas.*",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.coverage.run]
source = ["src/kairon"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "\\.\\.\\.",
]
